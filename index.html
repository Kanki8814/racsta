<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIVASOLEIL ACSTA</title>
<script>
  (function () {
    var ua = navigator.userAgent || '';
    // iPadOS は UA が Mac を名乗るためタッチ有無も併用
    var isIpad = /iPad/i.test(ua) || (/Macintosh/i.test(ua) && 'ontouchend' in document);
    var isMobile = /Android|webOS|iPhone|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua) || isIpad;
    location.replace(isMobile ? 'mobile.html' : 'pc.html');
  })();
</script>
</head>
<body>
<noscript>
  <p><a href="pc.html">PC版はこちら</a> / <a href="mobile.html">モバイル版はこちら</a></p>
</noscript>
</body>
</html>
