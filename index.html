<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIVASOLEIL ACSTA</title>
<script>
  (function () {
    var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
      || (window.matchMedia && window.matchMedia('(max-width: 768px)').matches);
    location.replace(isMobile ? 'mobile.html' : 'pc.html');
  })();
</script>
</head>
<body>
<noscript>
  <p><a href="pc.html">PC版はこちら</a> / <a href="mobile.html">モバイル版はこちら</a></p>
</noscript>
</body>
</html>
